      const [selectedDef, setSelectedDef] = useState(null);
      const [predictionSelection, setPredictionSelection] = useState({}); 
      const [showPredictionFeedback, setShowPredictionFeedback] = useState(false);

      // --- WHILE LISTENING ACTIVITIES ---
      const [listeningQuestions, setListeningQuestions] = useState([]);
      const [quizSubmitted, setQuizSubmitted] = useState(false);
      const [dictationValue, setDictationValue] = useState("");
      const [dictationChecked, setDictationChecked] = useState(false);
      const [dictationIsCorrect, setDictationIsCorrect] = useState(false);

      // --- AFTER LISTENING (POST) ACTIVITIES ---
      const [scrambledEvents, setScrambledEvents] = useState([]);
      const [scrambleComplete, setScrambleComplete] = useState(false);
      const [chronologyChecked, setChronologyChecked] = useState(false);
      const [chronologyScore, setChronologyScore] = useState(0);
      const [chatMessages, setChatMessages] = useState([]);
      const [userQuery, setUserQuery] = useState("");
      const [isChatLoading, setIsChatLoading] = useState(false);

      const [practiceHistory, setPracticeHistory] = useState([
        {
          id: "h_1",
          date: "2 hours ago",
          lessonTitle: "Preparing a Traditional Breakfast",
          level: "A2",
          activitiesPassed: ["Vocab Matcher", "Aural Quiz", "Gap Fill Dictation"],
          comprehensionGrade: "100%"
        }
      ]);

      // --- AUDIO SYNTHESIZER FOR SOUND FEEDBACK ---
      const playSoundEffect = (type) => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          
          if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
          } else {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
          }
          
          gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
          
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.start();
          
          setTimeout(() => { 
            oscillator.stop(); 
            audioCtx.close(); 
          }, 300);
        } catch(e) {
          console.log("Audio API no soportada", e);
        }
      };

      const activeLesson = LISTENING_DATABASE[level]?.[selectedLessonIdx] || LISTENING_DATABASE[level]?.[0];

      useEffect(() => {
        resetAndLoadLesson();
      }, [level, selectedLessonIdx]);

      const resetAndLoadLesson = () => {
        if (!activeLesson) return;
        window.speechSynthesis?.cancel();
        setIsPlaying(false);
        setShowTranscript(false);

        const vocab = activeLesson.preVocabulary.map((v, i) => ({ ...v, id: i, matched: false }));
        setVocabMatches(vocab);
        setSelectedWord(null);
        setSelectedDef(null);
        setPredictionSelection({});
        setShowPredictionFeedback(false);

        const questions = activeLesson.whileQuestions.map(q => ({ ...q, userAnswer: null }));
        setListeningQuestions(questions);
        setQuizSubmitted(false);

        setDictationValue("");
        setDictationChecked(false);
        setDictationIsCorrect(false);

        const scrambled = [...activeLesson.postChronology]
          .map(item => ({ ...item, currentPosition: Math.random() }))
          .sort((a, b) => a.currentPosition - b.currentPosition);
        setScrambledEvents(scrambled);
        setChronologyChecked(false);
        setScrambleComplete(false);

        setChatMessages([
          {
            sender: "coach",
            text: `Hello! I am your Cambridge Listening Coach. I've read the transcript of "${activeLesson.title}". Ask me any questions you have about its terms, grammar, or idioms! `
          }
        ]);

        setListeningStep('pre');
      };

      // --- PLAY AUDIO ---
      const playAudio = () => {
        if (!activeLesson) return;
        if (isPlaying) {
          window.speechSynthesis?.pause();
          setIsPlaying(false);
        } else {
          if (window.speechSynthesis?.paused) {
            window.speechSynthesis.resume();
            setIsPlaying(true);
          } else {
            window.speechSynthesis?.cancel();
            const utterance = new SpeechSynthesisUtterance(activeLesson.transcript);
            utterance.lang = 'en-US';
            utterance.rate = playbackRate;
            utterance.onend = () => setIsPlaying(false);
            utterance.onerror = () => setIsPlaying(false);
            window.speechSynthesis.speak(utterance);
            setIsPlaying(true);
          }
        }
      };

      const stopAudio = () => {
        window.speechSynthesis?.cancel();
        setIsPlaying(false);
      };

      // --- STAGE 1 LOGIC ---
      const handleSelectWord = (wordItem) => {
        if (selectedDef) evaluateVocabularyPair(wordItem, selectedDef);
        else setSelectedWord(wordItem);
      };

      const handleSelectDef = (defItem) => {
        if (selectedWord) evaluateVocabularyPair(selectedWord, defItem);
        else setSelectedDef(defItem);
      };

      const evaluateVocabularyPair = (wordObj, defObj) => {
        if (wordObj.definition === defObj.definition) {
          playSoundEffect('correct'); 
          setVocabMatches(prev => prev.map(item => {
            if (item.word === wordObj.word) return { ...item, matched: true };
            return item;
          }));
        } else {
          playSoundEffect('error'); 
        }
        setSelectedWord(null);
        setSelectedDef(null);
      };

      const isPreVocabComplete = () => {
        return vocabMatches.length > 0 && vocabMatches.every(v => v.matched);
      };

      const togglePredictionKeyword = (word) => {
        if (showPredictionFeedback) return;
        setPredictionSelection(prev => ({
          ...prev,
          [word]: !prev[word]
        }));
      };

      const checkPredictions = () => {
        setShowPredictionFeedback(true);
        let hasErrors = false;
        activeLesson.predictionKeywords.forEach(word => {
          const isSelected = !!predictionSelection[word];
          const isReal = activeLesson.transcript.toLowerCase().includes(word.toLowerCase());
          if ((isSelected && !isReal) || (!isSelected && isReal)) hasErrors = true;
        });
        
        if (hasErrors) playSoundEffect('error');
        else playSoundEffect('correct');
      };

      const isBeforeStagePerfect = () => {
        return isPreVocabComplete() && showPredictionFeedback;
      };

      // --- STAGE 2 LOGIC ---
      const setQuestionAnswer = (qIdx, optIdx) => {
        if (quizSubmitted) return;
        const updated = [...listeningQuestions];
        updated[qIdx].userAnswer = optIdx;
        setListeningQuestions(updated);
      };

      const checkQuizScores = () => {
        if (listeningQuestions.some(q => q.userAnswer === null)) return;
        setQuizSubmitted(true);
        const correctCount = getQuizCorrectCount();
        if (correctCount === listeningQuestions.length) playSoundEffect('correct');
        else playSoundEffect('error');
      };

      const getQuizCorrectCount = () => {
        return listeningQuestions.reduce((acc, curr) => curr.userAnswer === curr.correct ? acc + 1 : acc, 0);
      };

      const handleCheckDictation = () => {
        const isCorrect = dictationValue.trim().toLowerCase() === activeLesson.dictationGapFill.correctAnswer.toLowerCase();
        setDictationIsCorrect(isCorrect);
        setDictationChecked(true);
        if(isCorrect) playSoundEffect('correct');
        else playSoundEffect('error');
      };

      const isWhileStagePerfect = () => {
        return quizSubmitted && dictationChecked;
      };

      // --- STAGE 3 LOGIC ---
      const moveScrambledItem = (index, direction) => {
        if (chronologyChecked) return;
        const updated = [...scrambledEvents];
        if (direction === 'up' && index > 0) {
          const temp = updated[index];
          updated[index] = updated[index - 1];
          updated[index - 1] = temp;
        } else if (direction === 'down' && index < updated.length - 1) {
          const temp = updated[index];
          updated[index] = updated[index + 1];
          updated[index + 1] = temp;
        }
        setScrambledEvents(updated);
      };

      const verifyChronologyOrder = () => {
        let matches = 0;
        scrambledEvents.forEach((item, index) => {
          if (item.id === activeLesson.postChronology[index].id) matches++;
        });
        setChronologyScore(matches);
        setChronologyChecked(true);
        setScrambleComplete(matches === scrambledEvents.length);
        
        if (matches === scrambledEvents.length) playSoundEffect('correct');
        else playSoundEffect('error');

        if(matches === scrambledEvents.length){
             const completedRecord = {
              id: "h_" + Date.now(),
              date: "Just now",
              lessonTitle: activeLesson.title,
              level: level,
              activitiesPassed: ["Vocabulary Matcher", "Comprehension Quiz", "Gap Dictation", "Timeline Scrambler"],
              comprehensionGrade: `${Math.round((matches / scrambledEvents.length) * 100)}%`
            };
            setPracticeHistory(prev => [completedRecord, ...prev]);
        }
      };

      const sendChatMessage = async () => {
        if (userQuery.trim() === "") return;
        const messagePayload = { sender: "user", text: userQuery };
        setChatMessages(prev => [...prev, messagePayload]);
        setUserQuery("");
        setIsChatLoading(true);

        const apiKey = ""; 
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        const systemPrompt = `You are a Cambridge English Listening Coach. Student finished lesson on "${activeLesson.title}". Transcript: "${activeLesson.transcript}". Answer strictly in English.`;

        const payload = {
          contents: [{ parts: [{ text: userQuery }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        const fetchWithRetry = async (retries = 5, delay = 1000) => {
          try {
            const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('API limits');
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response found.";
          } catch (err) {
            if (retries > 0) {
              await new Promise(resolve => setTimeout(resolve, delay));
              return fetchWithRetry(retries - 1, delay * 2);
            }
            throw err;
          }
        };

        try {
          const answer = await fetchWithRetry();
          setChatMessages(prev => [...prev, { sender: "coach", text: answer }]);
        } catch (err) {
          setChatMessages(prev => [...prev, { sender: "coach", text: "Network error, please try again." }]);
        } finally {
          setIsChatLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col md:flex-row">
          {!focusMode && (
            <aside className="w-full md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col justify-between shrink-0">
              <div>
                <div className="p-6 border-b border-slate-800/80 flex items-center gap-3">
                  <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                    <Icon name="graduation-cap" size={22} />
                  </div>
                  <div>
                    <h1 className="font-extrabold text-lg leading-none text-white tracking-wide">AuralLab</h1>
                    <p className="text-[9px] text-slate-400 font-semibold tracking-widest mt-1">CAMBRIDGE LISTENING</p>
                  </div>
                </div>
                
                <div className="mx-4 my-6 p-4 bg-slate-900/60 rounded-xl border border-slate-800 flex items-center gap-3">
                  <div className="w-10 h-10 bg-amber-500/10 rounded-lg flex items-center justify-center">
                    <Icon name="fire" size={20} className="text-amber-500" />
                  </div>
                  <div>
                    <div className="text-xs text-slate-400">Streak Score</div>
                    <div className="text-sm font-bold text-white">5 Active Days</div>
                  </div>
                </div>

                <nav className="px-4 space-y-1.5 mt-6">
                  <button onClick={() => { setActiveTab('listening_lab'); stopAudio(); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'listening_lab' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/15' : 'text-slate-400 hover:bg-slate-900 hover:text-slate-100'}`}>
                    <Icon name="volume-high" size={18} /> Aural Listening Lab
                  </button>
                  <button onClick={() => { setActiveTab('guides'); stopAudio(); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'guides' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/15' : 'text-slate-400 hover:bg-slate-900 hover:text-slate-100'}`}>
                    <Icon name="book-open" size={18} /> Text Style Guides
                  </button>
                  <button onClick={() => { setActiveTab('history'); stopAudio(); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'history' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/15' : 'text-slate-400 hover:bg-slate-900 hover:text-slate-100'}`}>
                    <Icon name="clock-rotate-left" size={18} /> Aural Performance Logs
                  </button>
                </nav>
              </div>
              <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">AuralLab Studio v4.0</div>
            </aside>
          )}

          <div className="flex-1 flex flex-col bg-slate-900 min-h-screen overflow-y-auto">
            {!focusMode && (
              <header className="h-16 border-b border-slate-800 bg-slate-950/40 backdrop-blur-md px-8 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-xs uppercase tracking-widest text-indigo-400 font-bold bg-indigo-500/10 px-2.5 py-1 rounded">Active Workspace</span>
                  <h2 className="text-sm font-semibold text-slate-300">Listening Strategy & Interaction</h2>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-slate-400 font-medium">CEFR Tier:</span>
                    <select className="bg-indigo-900/40 border border-indigo-500/30 text-indigo-300 text-xs font-bold rounded-lg px-2.5 py-1 focus:outline-none" value={level} onChange={(e) => { setLevel(e.target.value); setSelectedLessonIdx(0); }}>
                      {CEFR_LEVELS.map(lvl => <option key={lvl} value={lvl} className="bg-slate-950 text-white">{lvl}</option>)}
                    </select>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-slate-400 font-medium">Lesson:</span>
                    <select className="bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-lg px-2.5 py-1 focus:outline-none" value={selectedLessonIdx} onChange={(e) => setSelectedLessonIdx(Number(e.target.value))}>
                      {LISTENING_DATABASE[level]?.map((less, idx) => <option key={idx} value={idx}>{less.title}</option>)}
                    </select>
                  </div>
                </div>
              </header>
            )}

            <div className="flex-1 p-6 md:p-8 max-w-7xl w-full mx-auto">
              {activeTab === 'listening_lab' && (
                <div className="space-y-6 animate-in fade-in duration-300">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-950/40 border border-slate-800 p-6 rounded-3xl">
                    <div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs uppercase tracking-widest text-indigo-400 font-bold">Aural Training Platform</span>
                        <span className="text-[10px] bg-indigo-600/20 text-indigo-300 border border-indigo-600/30 font-bold px-2 py-0.5 rounded-full">{level} Lesson</span>
                      </div>
                      <h3 className="text-2xl font-extrabold text-white mt-1">"{activeLesson?.title}"</h3>
                      <p className="text-xs text-slate-500 mt-1">Audio Source: {activeLesson?.audioTitle}</p>
                    </div>
                    <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800">
                      {[{ key: 'pre', label: '1. Before' }, { key: 'while', label: '2. While' }, { key: 'post', label: '3. After' }].map(step => (
                        <button key={step.key} onClick={() => setListeningStep(step.key)} className={`px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all flex items-center gap-1.5 ${listeningStep === step.key ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>
                          {step.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* === PRE LISTENING === */}
                  {listeningStep === 'pre' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                      <div className="lg:col-span-8 space-y-6">
                        <div className="bg-slate-950/40 border border-slate-800 rounded-3xl p-6 space-y-4">
                          <div className="flex items-center justify-between border-b border-slate-800/60 pb-3">
                            <h4 className="text-base font-bold text-white flex items-center gap-2">
                              <Icon name="circle-check" size={18} className="text-indigo-400" /> Activity 1: Vocabulary Matcher
                            </h4>
                          </div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                            <div className="space-y-2">
                              <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider block">Target Word</span>
                              {vocabMatches.map(v => (
                                <button key={v.word} onClick={() => !v.matched && handleSelectWord(v)} disabled={v.matched} className={`w-full p-3.5 rounded-xl text-left border text-xs font-semibold transition-all flex justify-between items-center ${v.matched ? 'bg-emerald-950/20 border-emerald-500/30 text-emerald-400/60 line-through' : selectedWord?.word === v.word ? 'bg-indigo-600/20 border-indigo-500 text-white shadow-lg shadow-indigo-600/5' : 'bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700'}`}>
                                  {v.word} {v.matched && <Icon name="circle-check" size={14} className="text-emerald-400" />}
                                </button>
                              ))}
                            </div>
                            <div className="space-y-2">
                              <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider block">Context Definition</span>
                              {vocabMatches.map(v => (
                                <button key={v.definition} onClick={() => !v.matched && handleSelectDef(v)} disabled={v.matched} className={`w-full p-3.5 rounded-xl text-left border text-xs font-semibold transition-all flex justify-between items-center ${v.matched ? 'bg-emerald-950/20 border-emerald-500/30 text-emerald-400/60 line-through' : selectedDef?.definition === v.definition ? 'bg-indigo-600/20 border-indigo-500 text-white shadow-lg shadow-indigo-600/5' : 'bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700'}`}>
                                  <span className="truncate max-w-[280px]">{v.definition}</span> {v.matched && <Icon name="circle-check" size={14} className="text-emerald-400" />}
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>

                        <div className="bg-slate-950/40 border border-slate-800 rounded-3xl p-6 space-y-4">
                          <div className="flex items-center justify-between border-b border-slate-800/60 pb-3">
                            <h4 className="text-base font-bold text-white flex items-center gap-2">
                              <Icon name="bullseye" size={18} className="text-indigo-400" /> Activity 2: Keyword Predictor
                            </h4>
                          </div>
                          <p className="text-xs text-slate-400 leading-relaxed">Read the title <strong>"{activeLesson.title}"</strong>. Which words do you predict are spoken?</p>
                          <div className="flex flex-wrap gap-2 pt-2">
                            {activeLesson.predictionKeywords.map((word) => {
                              const isSelected = !!predictionSelection[word];
                              const isReal = activeLesson.transcript.toLowerCase().includes(word.toLowerCase());
                              let styleClasses = "bg-slate-900 border-slate-800 text-slate-300 hover:border-slate-700";
                              if (showPredictionFeedback) {
                                if (isReal && isSelected) styleClasses = "bg-emerald-500/10 border-emerald-500/40 text-emerald-400 font-bold";
                                else if (!isReal && isSelected) styleClasses = "bg-rose-500/10 border-rose-500/40 text-rose-400 line-through";
                                else if (isReal && !isSelected) styleClasses = "bg-indigo-500/5 border-indigo-500/20 text-slate-500";
                              } else if (isSelected) styleClasses = "bg-indigo-600 text-white border-indigo-500";
                              
                              return <button key={word} onClick={() => togglePredictionKeyword(word)} disabled={showPredictionFeedback} className={`px-4 py-2 rounded-xl text-xs font-semibold border transition-all ${styleClasses}`}>{word}</button>;
                            })}
                          </div>
                          <div className="flex justify-end pt-3 border-t border-slate-850">
                            {!showPredictionFeedback ? (
                              <button onClick={checkPredictions} className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-2 px-4 rounded-xl transition-all">Verify Predictions</button>
                            ) : (
                              <button onClick={() => { setPredictionSelection({}); setShowPredictionFeedback(false); }} className="text-slate-400 hover:text-white text-xs font-bold flex items-center gap-1"><Icon name="arrow-rotate-left" size={12} /> Retry Prediction</button>
                            )}
                          </div>
                        </div>
                      </div>
                      
                      <div className="lg:col-span-4 bg-slate-950/40 border border-slate-800 rounded-3xl p-6">
                        <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400">Pre-Listening</h4>
                        <p className="text-xs text-slate-500 mt-2">Aural acquisition begins before pressing play. Brainstorming establishes critical neural scaffolding.</p>
                      </div>
                    </div>
                  )}

                  {/* === WHILE LISTENING === */}
                  {listeningStep === 'while' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                      <div className="lg:col-span-8 space-y-6">
                        
                        <div className="bg-slate-950/60 border border-slate-800 p-6 rounded-3xl space-y-4">
                          <div className="flex justify-between items-center">
                            <span className="text-xs font-bold text-emerald-400 uppercase tracking-widest"><Icon name="volume-high" size={14} className="inline mr-1" /> Virtual Audio Deck</span>
                            <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-lg border border-slate-800">
                              <span className="text-[10px] text-slate-500 px-2 font-bold">Speed</span>
                              {[0.8, 1.0, 1.2].map(r => <button key={r} onClick={() => setPlaybackRate(r)} className={`px-2 py-0.5 text-xs font-bold rounded ${playbackRate === r ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>{r}x</button>)}
                            </div>
                          </div>
                          <div className="bg-slate-900 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 border border-slate-850">
                            <div className="flex items-center gap-4">
                              <button onClick={playAudio} className="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg transition-all">{isPlaying ? <Icon name="pause" size={24} /> : <Icon name="play" size={24} className="ml-1" />}</button>
                              <div><span className="text-sm font-bold block text-slate-200">Play Listening Fragment</span></div>
                            </div>
                          </div>
                        </div>

                        <div className="bg-slate-950/40 border border-slate-800 p-6 rounded-3xl space-y-6">
                          <h4 className="text-base font-bold text-white"><Icon name="circle-question" size={18} className="inline mr-2 text-indigo-400" />Activity 1: Selective Detail Check</h4>
                          <div className="space-y-6">
                            {listeningQuestions.map((q, qIdx) => (
                              <div key={qIdx} className="space-y-2.5">
                                <span className="text-sm font-bold text-slate-300 block">{qIdx + 1}. {q.question}</span>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                  {q.options.map((opt, optIdx) => {
                                    const isSelected = q.userAnswer === optIdx;
                                    const isCorrect = q.correct === optIdx;
                                    let btnStyle = "bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-700";
                                    if (quizSubmitted) {
                                      if (isCorrect) btnStyle = "bg-emerald-500/15 border-emerald-500/50 text-emerald-400 font-bold";
                                      else if (isSelected && !isCorrect) btnStyle = "bg-rose-500/15 border-rose-500/50 text-rose-400 line-through";
                                      else btnStyle = "bg-slate-900 border-slate-850 text-slate-600 opacity-60";
                                    } else if (isSelected) btnStyle = "bg-indigo-600/20 border-indigo-500 text-indigo-400 font-bold";
                                    return <button key={optIdx} onClick={() => setQuestionAnswer(qIdx, optIdx)} disabled={quizSubmitted} className={`p-3 text-xs font-semibold rounded-xl text-left border transition-all ${btnStyle}`}>{opt}</button>;
                                  })}
                                </div>
                              </div>
                            ))}
                          </div>
                          {!quizSubmitted ? (
                            <button onClick={checkQuizScores} disabled={listeningQuestions.some(q => q.userAnswer === null)} className="bg-indigo-600 text-white font-bold py-2.5 px-6 rounded-xl text-xs">Submit Quiz</button>
                          ) : (
                            <span className="text-xs text-slate-400">Score: <strong className="text-indigo-400">{getQuizCorrectCount()} / {listeningQuestions.length}</strong></span>
                          )}
                        </div>

                        <div className="bg-slate-950/40 border border-slate-800 p-6 rounded-3xl space-y-4">
                          <h4 className="text-base font-bold text-white"><Icon name="bookmark" size={18} className="inline mr-2 text-indigo-400" />Activity 2: Gap-Fill Dictation</h4>
                          <div className="bg-slate-900 p-5 rounded-2xl border border-slate-850 space-y-4">
                            <p className="text-sm italic text-slate-200">"{activeLesson.dictationGapFill.text}"</p>
                            <div className="flex gap-2">
                              <input type="text" placeholder="Type missing word..." className="bg-slate-950 border border-slate-800 focus:border-indigo-500 outline-none rounded-xl text-xs px-4 py-2 flex-1 text-slate-200" value={dictationValue} onChange={(e) => setDictationValue(e.target.value)} disabled={dictationChecked}/>
                              {!dictationChecked ? (
                                <button onClick={handleCheckDictation} className="bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl text-xs">Check</button>
                              ) : (
                                <button onClick={() => { setDictationValue(""); setDictationChecked(false); setDictationIsCorrect(false); }} className="bg-slate-800 text-slate-300 rounded-xl text-xs font-bold px-6">Reset</button>
                              )}
                            </div>
                            {dictationChecked && (
                              <div className={`p-3 rounded-xl text-xs font-semibold ${dictationIsCorrect ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                {dictationIsCorrect ? "Excellent spelling!" : `Incorrect. The correct word was "${activeLesson.dictationGapFill.correctAnswer}".`}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>

                      <div className="lg:col-span-4 bg-slate-950/40 border border-slate-800 rounded-3xl p-6">
                        <h4 className="text-xs font-bold uppercase text-slate-400">While-Listening</h4>
                        <p className="text-xs text-slate-500 mt-2">This phase evaluates active memory and isolates specific terms to test deep comprehension.</p>
                      </div>
                    </div>
                  )}

                  {/* === AFTER LISTENING === */}
                  {listeningStep === 'post' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                      <div className="lg:col-span-8 space-y-6">
                        
                        <div className="bg-slate-950/40 border border-slate-800 rounded-3xl p-6 space-y-4">
                          <h4 className="text-base font-bold text-white"><Icon name="list-ol" size={18} className="inline mr-2 text-indigo-400" />Activity 1: Chronology Timeline</h4>
                          <div className="space-y-2 pt-2">
                            {scrambledEvents.map((item, index) => {
                              const originalIdx = activeLesson.postChronology.findIndex(x => x.id === item.id);
                              const isCorrectSpot = originalIdx === index;
                              let borderClass = chronologyChecked ? (isCorrectSpot ? "border-emerald-500/40 bg-emerald-950/15 text-emerald-300" : "border-rose-500/40 bg-rose-950/15 text-rose-300") : "border-slate-800 bg-slate-900";
                              return (
                                <div key={item.id} className={`p-4 rounded-xl border flex justify-between gap-4 text-xs font-semibold ${borderClass}`}>
                                  <div className="flex gap-3"><span className="w-6 h-6 rounded-lg bg-slate-950 flex items-center justify-center border border-slate-800">{index + 1}</span><span>{item.text}</span></div>
                                  <div className="flex gap-1.5">
                                    <button onClick={() => moveScrambledItem(index, 'up')} disabled={index === 0 || chronologyChecked} className="w-7 h-7 bg-slate-950 rounded-lg text-slate-400 border border-slate-800">▲</button>
                                    <button onClick={() => moveScrambledItem(index, 'down')} disabled={index === scrambledEvents.length - 1 || chronologyChecked} className="w-7 h-7 bg-slate-950 rounded-lg text-slate-400 border border-slate-800">▼</button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                          <div className="flex justify-end pt-4">
                            <button onClick={verifyChronologyOrder} className="bg-indigo-600 text-white font-bold py-2.5 px-6 rounded-xl text-xs">Verify Sequence</button>
                          </div>
                        </div>

                        <div className="bg-slate-950/40 border border-slate-800 rounded-3xl p-6 space-y-4">
                          <h4 className="text-base font-bold text-white"><Icon name="message" size={18} className="inline mr-2 text-indigo-400" />Activity 2: Conversation with Coach</h4>
                          <div className="bg-slate-900 border border-slate-850 rounded-2xl h-[280px] overflow-y-auto p-4 flex flex-col gap-3">
                            {chatMessages.map((msg, idx) => (
                              <div key={idx} className={`p-3.5 rounded-2xl text-xs max-w-[85%] ${msg.sender === "coach" ? 'bg-slate-950 border border-slate-800 text-slate-300 self-start' : 'bg-indigo-600 text-white self-end'}`}>
                                {msg.text}
                              </div>
                            ))}
                          </div>
                          <div className="flex gap-2">
                            <input type="text" placeholder="Ask about vocabulary or grammar..." className="bg-slate-950 border border-slate-800 outline-none rounded-xl text-xs px-4 py-3 flex-1 text-slate-200" value={userQuery} onChange={(e) => setUserQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendChatMessage()} disabled={isChatLoading}/>
                            <button onClick={sendChatMessage} disabled={isChatLoading || userQuery.trim() === ""} className="bg-indigo-600 text-white font-bold px-6 rounded-xl text-xs">Send</button>
                          </div>
                        </div>
                      </div>
                      
                      <div className="lg:col-span-4 bg-slate-950/40 border border-slate-800 rounded-3xl p-6">
                        <h4 className="text-xs font-bold uppercase text-slate-400">After-Listening</h4>
                        <p className="text-xs text-slate-500 mt-2">Sorting historical events sequentially and discussing context turns short-term memory elements into long-term language structures.</p>
                      </div>
                    </div>
                  )}

                </div>
              )}

              {activeTab === 'guides' && (
                <div className="space-y-8 animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {TEXT_TYPES.map((type) => (
                      <div key={type.id} className="bg-slate-950/40 border border-slate-800 p-6 rounded-3xl">
                        <h4 className="text-xl font-bold text-white mb-4">{type.name}</h4>
                        <p className="text-sm text-slate-300 mb-4">{type.purpose}</p>
                        <ul className="text-xs text-slate-400 space-y-2">
                          {type.indicators.map((ind, idx) => (
                            <li key={idx}>• {ind}</li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'history' && (
                <div className="space-y-6 animate-in fade-in duration-300">
                  <h3 className="text-2xl font-bold text-white">Interactive Session Logs</h3>
                  {practiceHistory.map((item) => (
                    <div key={item.id} className="bg-slate-950/40 border border-slate-800 p-6 rounded-2xl flex justify-between">
                      <div>
                        <span className="text-indigo-400 text-[10px] font-bold uppercase">{item.level}</span>
                        <h4 className="font-bold text-base text-slate-200 mt-1">"{item.lessonTitle}"</h4>
                      </div>
                      <div className="text-right">
                        <span className="text-[10px] text-slate-500 block uppercase">Correct Rate</span>
                        <span className="text-lg font-black text-indigo-400">{item.comprehensionGrade}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
